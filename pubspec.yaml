name: carpooling
description: HadiKid - School Carpool App for Parents
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  go_router: ^13.0.0
  flutter_animate: ^4.5.0
  pinput: ^3.0.1
  image_picker: ^1.0.7
  flutter_screenutil: ^5.9.3
  flutter_svg: ^2.0.10+1
  country_picker: ^2.0.27
  dotted_border: ^2.1.0
  url_launcher: ^6.3.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/images/